[project]
site_name = "Montreal_Donnees"
site_url = "https://6396262-bdeb-qc-ca.github.io/donnees.montreal.ca/"
repo_url = "https://github.com/6396262-bdeb-qc-ca/donnees.montreal.ca"
repo_name = "6396262-bdeb-qc-ca/donnees.montreal.ca"

nav = [
  { "Home" = "index.md" },
  { "Installation" = "installation.md" },
  { "Usage" = "usage.md" },
  { "API Reference" = "api.md" },
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]
